<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Retirely mark: sun rising over a growth curve. Original artwork for Retirely (Fermiware). -->
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#e040fb"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="#060b1a"/>
  <!-- sun -->
  <circle cx="24" cy="21" r="8" fill="url(#rg)"/>
  <!-- rays -->
  <g stroke="url(#rg)" stroke-width="2.4" stroke-linecap="round">
    <path d="M24 6.5v3.5"/>
    <path d="M34.6 11.4l-2.5 2.5"/>
    <path d="M13.4 11.4l2.5 2.5"/>
    <path d="M39 21h-3.5"/>
    <path d="M9 21h3.5"/>
  </g>
  <!-- rolling horizon / growth curve -->
  <path d="M7 38c8.5 0 10.5-8 17-8s8.5 8 17 8" stroke="url(#rg2)" stroke-width="3.2" fill="none" stroke-linecap="round"/>
</svg>
